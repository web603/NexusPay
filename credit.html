<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPay — Credit Operations</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-base: #D4D4D4;
            --bg-plasma-1: rgba(13, 148, 136, 0.04);
            --bg-plasma-2: rgba(99, 102, 241, 0.04);
            --panel-bg: rgba(240, 244, 250, 0.75);
            --panel-border: rgba(45, 55, 72, 0.12);
            --text-main: #2d3748;
            --text-muted: #5a6578;
            --header-bg: rgba(240, 244, 250, 0.65);
            --footer-bg: rgba(240, 244, 250, 0.65);
            --footer-border: rgba(45, 55, 72, 0.12);
            --footer-inner-glow: rgba(255, 255, 255, 0.8);
            --panel-shadow: 0 12px 30px -8px rgba(45, 55, 72, 0.06), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            --clay-btn-shadow: 0 8px 16px -4px rgba(13, 148, 136, 0.15), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            --input-bg: #ffffff;
            --input-border: rgba(45, 55, 72, 0.18);
            --input-text: #2d3748;
            --auth-overlay: rgba(238, 241, 246, 0.85);
            --pill-active-bg: rgba(45, 55, 72, 0.08);
        }

        .dark {
            --bg-base: #0c0f16;
            --bg-plasma-1: rgba(20, 184, 166, 0.06);
            --bg-plasma-2: rgba(99, 102, 241, 0.06);
            --panel-bg: rgba(20, 25, 38, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --header-bg: rgba(20, 25, 38, 0.65);
            --footer-bg: rgba(20, 25, 38, 0.6);
            --footer-border: rgba(255, 255, 255, 0.08);
            --footer-inner-glow: rgba(255, 255, 255, 0.06);
            --panel-shadow: 0 25px 50px -20px rgba(0, 0, 0, 0.45), inset 0 1px 1px rgba(255, 255, 255, 0.06);
            --clay-btn-shadow: 0 10px 20px -5px rgba(20, 184, 166, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.1);
            --input-bg: #141822;
            --input-border: rgba(255, 255, 255, 0.12);
            --input-text: #f1f5f9;
            --auth-overlay: rgba(12, 15, 22, 0.88);
            --pill-active-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border);
            box-shadow: var(--panel-shadow);
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }

        .glass-dock {
            background: var(--footer-bg);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid var(--footer-border);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.15), inset 0 1px 1px var(--footer-inner-glow);
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .plasma-glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.75;
            mix-blend-mode: plus-lighter;
            animation: floatGlow 20s infinite alternate ease-in-out;
        }
        .plasma-1 {
            top: -15%;
            left: -10%;
            background: var(--bg-plasma-1);
        }
        .plasma-2 {
            bottom: -15%;
            right: -10%;
            background: var(--bg-plasma-2);
            animation-delay: -6s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(50px, -70px) scale(1.1); }
            100% { transform: translate(-30px, 50px) scale(0.95); }
        }

        .clay-button {
            border-radius: 1rem;
            box-shadow: var(--clay-btn-shadow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-36 md:pb-12 antialiased">

    <div class="plasma-glow plasma-1"></div>
    <div class="plasma-glow plasma-2"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <div id="toast-container" class="fixed top-6 right-6 z-50 space-y-3 pointer-events-none w-full max-w-sm"></div>

    <!-- Shared Database Configuration & Security Helpers -->
    <script src="firebase-config.js"></script>

    <!-- INITIAL SKELETON LOADER SCREEN -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[var(--bg-base)]">
        <div class="space-y-6 w-full max-w-md px-6 flex flex-col items-center">
            <!-- Icon/Shield placeholder -->
            <div class="h-16 w-16 bg-slate-500/10 rounded-2xl animate-pulse flex items-center justify-center border border-slate-500/10 mb-2">
                <div class="h-6 w-6 bg-slate-500/20 rounded-full"></div>
            </div>
            <!-- Title placeholder -->
            <div class="h-6 w-48 bg-slate-500/15 rounded-lg animate-pulse"></div>
            <div class="h-4 w-32 bg-slate-500/10 rounded-lg animate-pulse"></div>
            
            <!-- Structural field placeholders -->
            <div class="w-full space-y-4 pt-6">
                <div class="h-12 bg-slate-500/10 rounded-xl animate-pulse w-full"></div>
                <div class="h-12 bg-slate-500/10 rounded-xl animate-pulse w-full"></div>
                <div class="h-12 bg-slate-500/15 rounded-xl animate-pulse w-full pt-2"></div>
            </div>
        </div>
    </div>

    <!-- AUTHENTICATION DIALOG SCREEN (Hidden by default to allow Loader to show first) -->
    <div id="auth-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-[var(--auth-overlay)] backdrop-blur-xl transition-opacity duration-300">
        <div class="glass-panel w-full max-w-md p-8 rounded-3xl mx-4">
            <div class="text-center mb-8">
                <div class="h-12 w-12 bg-teal-500/10 rounded-2xl flex items-center justify-center mx-auto mb-3 border border-teal-500/20">
                    <i data-lucide="shield" class="text-teal-600 dark:text-teal-400 w-6 h-6"></i>
                </div>
                <h2 class="text-2xl font-extrabold tracking-tight font-display text-[var(--text-main)]">NexusPay Login</h2>
                <p class="text-[var(--text-muted)] text-sm mt-1 font-sans">Authorize session access to proceed</p>
            </div>

            <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase font-semibold text-[var(--text-muted)] mb-1 tracking-wider">Email Address</label>
                        <input type="text" id="auth-email" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] text-[var(--input-text)] focus:border-teal-500 rounded-xl px-4 py-3 outline-none transition-all text-sm placeholder-slate-400" placeholder="username@domain.com">
                    </div>
                    <div>
                        <label class="block text-xs uppercase font-semibold text-[var(--text-muted)] mb-1 tracking-wider">Password</label>
                        <input type="password" id="auth-password" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] text-[var(--input-text)] focus:border-teal-500 rounded-xl px-4 py-3 outline-none transition-all text-sm placeholder-slate-400" placeholder="••••••••">
                    </div>
                </div>

                <div class="mt-6">
                    <button type="submit" id="btn-primary-auth" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-medium py-3 px-4 rounded-xl transition duration-200 text-sm shadow-lg shadow-teal-500/10">
                        Authenticate Account
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- MAIN APP FLOW WRAPPER -->
    <div id="app-wrapper" class="hidden flex-1 flex flex-col">

        <header class="sticky top-4 z-40 mx-auto w-full max-w-5xl px-4 my-4">
            <div class="glass-dock py-2 px-6 flex justify-between items-center shadow-lg transition-all">
                <div class="flex items-center space-x-3">
                    <div class="h-9 w-9 bg-teal-500/15 rounded-full flex items-center justify-center border border-teal-500/30">
                        <i data-lucide="layers" class="text-teal-600 dark:text-teal-400 w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-teal-600 to-indigo-600 dark:from-white dark:to-slate-300 bg-clip-text text-transparent font-display">NexusPay</span>
                </div>

                <nav class="hidden md:flex space-x-1">
                    <a href="index.html" class="tab-btn px-4 py-2 rounded-full text-xs font-bold text-[var(--text-muted)] hover:bg-slate-500/10 transition-all flex items-center space-x-2">
                        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="credit.html" class="tab-btn px-4 py-2 rounded-full text-xs font-bold bg-[var(--pill-active-bg)] text-[var(--text-main)] shadow-sm transition-all flex items-center space-x-2">
                        <i data-lucide="plus-circle" class="w-3.5 h-3.5 text-emerald-600 dark:text-emerald-400"></i>
                        <span>Credit</span>
                    </a>
                    <a href="debit.html" class="tab-btn px-4 py-2 rounded-full text-xs font-bold text-[var(--text-muted)] hover:bg-slate-500/10 transition-all flex items-center space-x-2">
                        <i data-lucide="minus-circle" class="w-3.5 h-3.5 text-rose-600 dark:text-rose-400"></i>
                        <span>Debit</span>
                    </a>
                    <a href="fd.html" class="tab-btn px-4 py-2 rounded-full text-xs font-bold text-[var(--text-muted)] hover:bg-slate-500/10 transition-all flex items-center space-x-2">
                        <i data-lucide="piggy-bank" class="w-3.5 h-3.5 text-amber-500"></i>
                        <span>Fixed Deposits</span>
                    </a>
                </nav>

                <div class="flex items-center space-x-3">
                    <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-slate-500/10 text-[var(--text-muted)] transition-colors">
                        <i data-lucide="sun" id="theme-icon-sun" class="w-4 h-4 hidden dark:block"></i>
                        <i data-lucide="moon" id="theme-icon-moon" class="w-4 h-4 block dark:hidden"></i>
                    </button>
                    <div class="hidden sm:flex flex-col text-right font-semibold">
                        <span id="user-display-name" class="text-xs text-[var(--text-main)] font-sans">Syncing...</span>
                    </div>
                    <button onclick="handleSignOut()" class="p-2 rounded-full bg-slate-500/10 hover:bg-rose-500/20 text-rose-500 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1 w-full max-w-6xl mx-auto px-4 py-4 space-y-6">
            <section id="view-credit" class="space-y-6">
                <div class="flex justify-between items-center border-b border-slate-500/10 pb-4">
                    <div>
                        <h2 class="text-2xl font-extrabold tracking-tight font-display text-[var(--text-main)]">Credit Operations</h2>
                        <p class="text-xs text-[var(--text-muted)] mt-1 font-sans">Monitor and execute incoming receipts.</p>
                    </div>
                    <button onclick="openCreditModal()" class="clay-button bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-4 text-xs tracking-wider uppercase flex items-center space-x-2 shadow-lg">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        <span>Add Credit</span>
                    </button>
                </div>

                <div class="flex justify-end">
                    <div class="flex items-center space-x-1 bg-slate-500/10 p-1 rounded-xl border border-[var(--panel-border)]">
                        <span class="text-[10px] text-[var(--text-muted)] font-extrabold uppercase px-2">Group by:</span>
                        <button onclick="setGroupingMode('credit', 'day')" id="group-credit-day" class="group-toggle-btn px-2.5 py-1 rounded-lg text-[10px] font-bold bg-teal-500 text-white font-sans">Day</button>
                        <button onclick="setGroupingMode('credit', 'month')" id="group-credit-month" class="group-toggle-btn px-2.5 py-1 rounded-lg text-[10px] font-bold text-[var(--text-muted)] hover:text-[var(--text-main)] font-sans">Month</button>
                        <button onclick="setGroupingMode('credit', 'year')" id="group-credit-year" class="group-toggle-btn px-2.5 py-1 rounded-lg text-[10px] font-bold text-[var(--text-muted)] hover:text-[var(--text-main)] font-sans">Year</button>
                    </div>
                </div>

                <div id="credit-grouped-ledger" class="space-y-4"></div>
            </section>
        </main>

        <footer class="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 w-[92%] max-w-md md:hidden">
            <div class="glass-dock py-1.5 px-2 flex justify-between items-center relative overflow-hidden">
                <button onclick="window.location.href='index.html'" class="footer-btn flex-1 flex flex-col items-center justify-center py-2 transition-all text-[var(--text-muted)]" data-foot-tab="dashboard">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span class="text-[9px] font-extrabold tracking-tight mt-0.5">Home</span>
                </button>
                <button onclick="window.location.href='credit.html'" class="footer-btn flex-1 flex flex-col items-center justify-center py-2 transition-all bg-[var(--pill-active-bg)] text-[var(--text-main)] rounded-full shadow-sm" data-foot-tab="credit">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span class="text-[9px] font-extrabold tracking-tight mt-0.5">Credit</span>
                </button>
                <button onclick="window.location.href='debit.html'" class="footer-btn flex-1 flex flex-col items-center justify-center py-2 transition-all text-[var(--text-muted)]" data-foot-tab="debit">
                    <i data-lucide="minus-circle" class="w-4 h-4"></i>
                    <span class="text-[9px] font-extrabold tracking-tight mt-0.5">Debit</span>
                </button>
                <button onclick="window.location.href='fd.html'" class="footer-btn flex-1 flex flex-col items-center justify-center py-2 transition-all text-[var(--text-muted)]" data-foot-tab="fds">
                    <i data-lucide="piggy-bank" class="w-4 h-4"></i>
                    <span class="text-[9px] font-extrabold tracking-tight mt-0.5">FD's</span>
                </button>
            </div>
        </footer>
    </div>

    <!-- MODAL: ADD CREDIT -->
    <div id="add-credit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 dark:bg-slate-950/85 backdrop-blur-md px-4">
        <div class="glass-panel w-full max-w-md p-6 rounded-3xl mx-auto space-y-4">
            <div class="flex justify-between items-center border-b border-slate-300 dark:border-slate-700/50 pb-2">
                <span class="text-xs uppercase font-extrabold tracking-wider text-emerald-600 dark:text-emerald-500 font-display">Record Credit Inflow</span>
                <button onclick="closeCreditModal()" class="text-[var(--text-muted)] hover:text-[var(--text-main)]"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <form id="credit-form" onsubmit="handleCreditSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-bold text-[var(--text-muted)] mb-1 tracking-wider">Execution Date</label>
                    <input type="date" id="credit-date" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] rounded-xl px-4 py-2.5 text-[var(--text-main)] outline-none text-xs focus:border-teal-500">
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-[var(--text-muted)] mb-1 tracking-wider">Target Account</label>
                    <select id="credit-bank" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] rounded-xl px-4 py-2.5 text-[var(--text-main)] outline-none text-xs focus:border-teal-500">
                        <option value="" disabled selected class="text-[var(--text-muted)] bg-[var(--bg-base)]">Select destination bank</option>
                        <option value="Union Bank of India" class="text-[var(--text-main)] bg-[var(--bg-base)]">Union Bank of India</option>
                        <option value="HDFC Bank" class="text-[var(--text-main)] bg-[var(--bg-base)]">HDFC Bank</option>
                        <option value="Vishveshwar Bank" class="text-[var(--text-main)] bg-[var(--bg-base)]">Vishveshwar Bank</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-[var(--text-muted)] mb-1 tracking-wider">Inflow Amount (INR)</label>
                    <input type="number" step="0.01" min="0.01" id="credit-amount" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] rounded-xl px-4 py-2.5 text-[var(--text-main)] outline-none text-xs focus:border-teal-500" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-[var(--text-muted)] mb-1 tracking-wider">Description</label>
                    <input type="text" id="credit-description" required class="w-full bg-[var(--input-bg)] border border-[var(--input-border)] rounded-xl px-4 py-2.5 text-[var(--text-main)] outline-none text-xs focus:border-teal-500" placeholder="e.g. Inflow description">
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition duration-200 text-xs shadow-md">
                        Commit Credit Record
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let transUnsubscribe = null;
        let allTransactions = [];
        const groupingModes = { credit: 'day' };

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
            lucide.createIcons();
        });

        function toggleTheme() {
            const htmlElement = document.documentElement;
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                htmlElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        auth.onAuthStateChanged(user => {
            // Dismiss the initial skeleton loader screen
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.classList.add('hidden');
            }

            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-wrapper').classList.remove('hidden');
                document.getElementById('user-display-name').innerText = user.email;
                initDataStreams();
            } else {
                currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-wrapper').classList.add('hidden');
                if (transUnsubscribe) transUnsubscribe();
            }
        });

        function handleAuthSubmit(e) {
            e.preventDefault();
            const emailInput = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const submitBtn = document.getElementById('btn-primary-auth');

            const cleanEmail = sanitizeInput(emailInput);
            
            if (!isValidAttributeInput(cleanEmail)) {
                showToast("Security Restriction: Identifier contains unpermitted characters.", "error");
                return;
            }

            const allowedUsernames = ['athanesupriya', 'athaneneel23'];
            const containsAllowed = allowedUsernames.some(username => cleanEmail.toLowerCase().includes(username));
            
            if (!containsAllowed) {
                showToast("Security Restriction: Unauthorized login credential.", "error");
                return;
            }

            submitBtn.innerText = "Authenticating...";
            submitBtn.disabled = true;

            let processedEmail = cleanEmail;
            if (!processedEmail.includes('@')) {
                processedEmail = `${cleanEmail}@nexuspay.com`;
            }

            auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
                .then(() => {
                    return auth.signInWithEmailAndPassword(processedEmail, password);
                })
                .then(() => {
                    showToast("Session authorized successfully.", "success");
                })
                .catch(error => {
                    showToast(`Authentication Security Error: ${error.message}`, "error");
                    submitBtn.innerText = "Authenticate Account";
                    submitBtn.disabled = false;
                });
        }

        function handleSignOut() {
            if (confirm("Terminate secure session?")) {
                auth.signOut().then(() => {
                    showToast("Logged out safely.", "success");
                });
            }
        }

        function initDataStreams() {
            if (!currentUser) return;

            transUnsubscribe = db.collection('nexus_transactions')
                .where('uid', '==', currentUser.uid)
                .onSnapshot(snapshot => {
                    allTransactions = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        data.id = doc.id;
                        allTransactions.push(data);
                    });
                    allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderGroupedTimeline('credit-grouped-ledger', allTransactions, 'credit', groupingModes.credit);
                }, err => {
                    showToast("Database loading interrupted.", "error");
                });
        }

        function renderGroupedTimeline(containerId, dataList, filterType, groupingMode) {
            const container = document.getElementById(containerId);
            if (!container) return;

            let filtered = dataList.filter(t => t.type === filterType);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel p-8 text-center text-[var(--text-muted)]">
                        <p class="text-xs font-sans">No matching operations recorded.</p>
                    </div>
                `;
                return;
            }

            const groups = {};
            filtered.forEach(t => {
                let groupKey = 'Other';
                if (t.date) {
                    const dateObj = new Date(t.date);
                    if (!isNaN(dateObj.getTime())) {
                        if (groupingMode === 'day') {
                            groupKey = dateObj.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
                        } else if (groupingMode === 'month') {
                            groupKey = dateObj.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
                        } else if (groupingMode === 'year') {
                            groupKey = dateObj.getFullYear().toString();
                        }
                    }
                }
                if (!groups[groupKey]) groups[groupKey] = [];
                groups[groupKey].push(t);
            });

            const sortedKeys = Object.keys(groups).sort((a, b) => {
                const dateA = new Date(groups[a][0].date);
                const dateB = new Date(groups[b][0].date);
                return dateB - dateA;
            });

            let finalHtml = '';
            sortedKeys.forEach(groupName => {
                finalHtml += `
                    <div class="space-y-2 font-sans">
                        <div class="flex justify-between items-center py-2 px-1 border-b border-[var(--panel-border)] mt-6 mb-2">
                            <span class="text-xs uppercase font-extrabold tracking-wider text-[var(--text-main)] font-display">${groupName}</span>
                            <span class="text-[10px] bg-slate-500/10 text-[var(--text-muted)] px-2.5 py-1 rounded-full font-bold">${groups[groupName].length} Records</span>
                        </div>
                `;

                groups[groupName].forEach(t => {
                    finalHtml += `
                        <div class="glass-panel p-4 flex justify-between items-center text-xs hover:bg-slate-500/5 transition">
                            <div class="flex items-center space-x-3 min-w-0">
                                <div class="h-8 w-8 rounded-full flex items-center justify-center shrink-0 text-emerald-600 bg-emerald-500/10 dark:text-emerald-400">
                                    <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
                                </div>
                                <div class="min-w-0">
                                    <h4 class="font-bold text-[var(--text-main)] truncate">${t.description}</h4>
                                    <p class="text-[10px] text-[var(--text-muted)] truncate">${t.bank} &bull; <span class="font-mono">${t.date}</span></p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-3 shrink-0 ml-4">
                                <span class="font-bold text-sm text-emerald-600 dark:text-emerald-500 font-display">+ ₹${parseFloat(t.amount).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</span>
                                <button onclick="handleDeleteTransaction('${t.id}')" class="text-rose-500 hover:text-rose-400 p-1.5 rounded-lg hover:bg-rose-500/10 transition">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                finalHtml += `</div>`;
            });

            container.innerHTML = finalHtml;
            lucide.createIcons();
        }

        function setGroupingMode(viewKey, mode) {
            groupingModes[viewKey] = mode;
            document.querySelectorAll(`#view-${viewKey} .group-toggle-btn`).forEach(btn => {
                if (btn.id === `group-${viewKey}-${mode}`) {
                    btn.className = "group-toggle-btn px-2.5 py-1 rounded-lg text-[10px] font-bold bg-teal-500 text-white font-sans";
                } else {
                    btn.className = "group-toggle-btn px-2.5 py-1 rounded-lg text-[10px] font-bold text-[var(--text-muted)] hover:text-[var(--text-main)] font-sans";
                }
            });
            renderGroupedTimeline('credit-grouped-ledger', allTransactions, 'credit', groupingModes.credit);
        }

        function openCreditModal() { document.getElementById('add-credit-modal').classList.remove('hidden'); }
        function closeCreditModal() { document.getElementById('add-credit-modal').classList.add('hidden'); }

        function handleCreditSubmit(e) {
            e.preventDefault();
            if (!currentUser) return;

            const date = document.getElementById('credit-date').value;
            const bank = document.getElementById('credit-bank').value;
            const amount = parseFloat(document.getElementById('credit-amount').value);
            const rawDescription = document.getElementById('credit-description').value;

            const description = sanitizeInput(rawDescription);

            db.collection('nexus_transactions').add({
                uid: currentUser.uid,
                type: 'credit',
                date,
                bank,
                amount,
                description,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                document.getElementById('credit-form').reset();
                closeCreditModal();
                showToast("Credit operation recorded successfully.", "success");
            })
            .catch(err => {
                showToast("Error executing transaction", "error");
            });
        }

        function handleDeleteTransaction(id) {
            if (confirm("Confirm absolute transaction deletion? Balance calculations will adapt immediately.")) {
                db.collection('nexus_transactions').doc(id).delete()
                    .then(() => { showToast("Record deleted successfully.", "success"); })
                    .catch(err => { showToast("Operation failed.", "error"); });
            }
        }
    </script>
</body>
</html>
